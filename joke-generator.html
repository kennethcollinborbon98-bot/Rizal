<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Random Joke Generator - Get a laugh with our joke API">
  <title>Random Joke Generator</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Space+Mono:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #161d2e;
      --navy-deep: #0f1422;
      --paper: #e8dfc8;
      --bone: #f7f3ea;
      --red: #a83b34;
      --cyan: #4fd8c4;
      --ink: #171512;
      --paper-line: rgba(23, 21, 18, 0.14);
      --navy-line: rgba(247, 243, 234, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bone);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      line-height: 1.6;
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
      z-index: 9999;
    }

    .skip-link:focus {
      left: 8px;
      top: 8px;
      width: auto;
      height: auto;
      padding: 8px 12px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }

    :focus {
      outline: 3px solid rgba(255, 179, 71, 0.95);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }
      * {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
      }
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      background: var(--navy);
      color: var(--bone);
      padding: 64px 0;
      border-bottom: 6px solid var(--red);
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin: 0 0 16px 0;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 1.1rem;
      color: rgba(247, 243, 234, 0.82);
      margin: 0;
    }

    /* Main Content */
    main {
      padding: 56px 0;
    }

    .joke-container {
      background: var(--paper);
      border: 2px solid var(--paper-line);
      padding: 40px;
      border-radius: 8px;
      margin-bottom: 32px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .joke-text {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--red);
      margin: 0 0 20px 0;
      line-height: 1.7;
    }

    .joke-category {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--cyan);
      margin-top: auto;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      padding: 14px 32px;
      border: 2px solid var(--navy);
      background: var(--navy);
      color: var(--bone);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    button:hover {
      background: var(--navy-deep);
      border-color: var(--red);
    }

    button:active {
      transform: scale(0.98);
    }

    .secondary-btn {
      background: var(--paper);
      color: var(--navy);
      border-color: var(--navy);
    }

    .secondary-btn:hover {
      background: var(--red);
      color: var(--bone);
      border-color: var(--red);
    }

    /* Loading State */
    .loading {
      text-align: center;
      color: var(--cyan);
      font-family: 'Space Mono', monospace;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(79, 216, 196, 0.3);
      border-top: 3px solid var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error State */
    .error {
      background: #ffebee;
      border-color: var(--red);
      color: var(--red);
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    /* Footer */
    footer {
      background: var(--navy-deep);
      color: rgba(247, 243, 234, 0.6);
      padding: 40px 0;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
    }

    footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .joke-container {
        padding: 24px;
        min-height: 150px;
      }

      .joke-text {
        font-size: 1.15rem;
      }

      button {
        flex: 1;
        min-width: 100px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header role="banner">
    <div class="wrap">
      <h1>😂 Random Joke Generator</h1>
      <p>Get a random laugh from our API-powered joke collection</p>
    </div>
  </header>

  <main id="main" role="main">
    <div class="wrap">
      <div id="error-container"></div>
      
      <div class="joke-container" aria-live="polite" aria-label="Joke display">
        <div id="joke-display" class="joke-text">
          Click "Get Joke" to load a random joke...
        </div>
        <div class="joke-category" id="joke-category"></div>
      </div>

      <div class="button-group">
        <button onclick="getJoke()" id="get-joke-btn">
          Get Joke
        </button>
        <button class="secondary-btn" onclick="copyJoke()" id="copy-btn">
          Copy Joke
        </button>
        <button class="secondary-btn" onclick="shareJoke()" id="share-btn">
          Share
        </button>
      </div>
    </div>
  </main>

  <footer role="contentinfo">
    <div class="wrap">
      <p>Jokes powered by <a href="https://official-joke-api.appspot.com/" target="_blank" rel="noopener noreferrer">Official Joke API</a></p>
      <p><a href="index.html">← Back to Rizal</a></p>
    </div>
  </footer>

  <script>
    let currentJoke = {
      setup: '',
      punchline: '',
      type: ''
    };

    async function getJoke() {
      const btn = document.getElementById('get-joke-btn');
      const display = document.getElementById('joke-display');
      const category = document.getElementById('joke-category');
      const errorContainer = document.getElementById('error-container');
      
      // Clear error
      errorContainer.innerHTML = '';
      
      // Show loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Loading...';
      display.textContent = 'Fetching a joke for you...';
      category.textContent = '';

      try {
        // Fetch from Official Joke API
        const response = await fetch('https://official-joke-api.appspot.com/random_joke');
        
        if (!response.ok) {
          throw new Error('Failed to fetch joke');
        }

        const data = await response.json();
        
        // Store the joke
        currentJoke = {
          setup: data.setup,
          punchline: data.punchline,
          type: data.type
        };

        // Display the joke with a slight delay for effect
        setTimeout(() => {
          display.innerHTML = `
            <span>${data.setup}</span>
            <br><br>
            <span style="color: var(--cyan);">${data.punchline}</span>
          `;
          category.textContent = `Category: ${data.type.toUpperCase()}`;
        }, 300);

      } catch (error) {
        console.error('Error:', error);
        display.textContent = 'Oops! Something went wrong. Try again!';
        errorContainer.innerHTML = `
          <div class="error">
            <strong>Error:</strong> Could not fetch joke. Please check your internet connection and try again.
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Get Joke';
      }
    }

    function copyJoke() {
      const jokeText = `${currentJoke.setup}\n\n${currentJoke.punchline}`;
      
      navigator.clipboard.writeText(jokeText).then(() => {
        const btn = document.getElementById('copy-btn');
        const originalText = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(() => {
        alert('Failed to copy. Please try again.');
      });
    }

    function shareJoke() {
      const jokeText = `${currentJoke.setup}\n${currentJoke.punchline}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Check out this joke!',
          text: jokeText,
          url: window.location.href
        }).catch(err => console.log('Share cancelled'));
      } else {
        // Fallback for browsers that don't support Web Share API
        const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(jokeText)} 😂`;
        window.open(shareUrl, '_blank');
      }
    }

    // Load a joke on page load
    window.addEventListener('load', () => {
      getJoke();
    });
  </script>

</body>
</html>
